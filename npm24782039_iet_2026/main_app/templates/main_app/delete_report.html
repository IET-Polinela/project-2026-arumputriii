{% extends 'base.html' %}

{% block title %}Hapus Laporan{% endblock %}

{% block content %}

<div class="app-card">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
            <li class="breadcrumb-item active" aria-current="page">Hapus Laporan</li>
        </ol>
    </nav>

    <div class="d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-trash-fill text-danger fs-4"></i>
        <h2 class="section-title mb-0">Hapus Laporan</h2>
    </div>

    <p class="mb-4">
        Yakin ingin menghapus laporan <strong>"{{ object.title }}"</strong>?
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="d-flex flex-wrap gap-2">
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash me-1"></i> Ya, Hapus
            </button>
            <a href="{% url 'report_list' %}" class="btn btn-secondary">
                <i class="bi bi-x-circle me-1"></i> Batal
            </a>
        </div>
    </form>
</div>

{% endblock %}
