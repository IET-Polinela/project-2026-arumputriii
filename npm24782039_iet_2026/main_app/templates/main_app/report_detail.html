<!DOCTYPE html>
<html>
<head>
    <title>Detail Laporan</title>
</head>
<body>
    <h1>Detail Laporan</h1>

    <p><strong>Judul:</strong> {{ report.title }}</p>
    <p><strong>Kategori:</strong> {{ report.category }}</p>
    <p><strong>Deskripsi:</strong> {{ report.description }}</p>
    <p><strong>Lokasi:</strong> {{ report.location }}</p>
    <p><strong>Status:</strong> {{ report.status }}</p>
    <p><strong>Dibuat pada:</strong> {{ report.created_at }}</p>

    <p><a href="{% url 'home' %}">Kembali</a></p>
</body>
</html>
