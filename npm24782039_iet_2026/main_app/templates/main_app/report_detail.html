<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Laporan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            line-height: 1.6;
        }

        .detail-box {
            max-width: 700px;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 6px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .detail-item {
            margin-bottom: 12px;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Detail Laporan</h1>

    <div class="detail-box">
        <h2>{{ report.title }}</h2>

        <p class="detail-item"><strong>Kategori:</strong> {{ report.category }}</p>
        <p class="detail-item"><strong>Deskripsi:</strong> {{ report.description }}</p>
        <p class="detail-item"><strong>Lokasi:</strong> {{ report.location }}</p>
        <p class="detail-item"><strong>Status:</strong> {{ report.get_status_display }}</p>
        <p class="detail-item"><strong>Dibuat:</strong> {{ report.created_at }}</p>

        <a href="{% url 'report_list' %}" class="back-link">Kembali</a>
    </div>
</body>
</html>
