<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body style="

    <div style="text-align: center; padding: 70px 20px 35px;">

    <div style="

        margin: 0 auto 60px auto;
        padding: 28px 24px;

        <div style="margin-top: 24px;">
            <a href="/about/" style="

                font-weight: bold;

            <a href="/contacts/" style="
                text-decoration: none;
                background-color: #7ccf6b;
