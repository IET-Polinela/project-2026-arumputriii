{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center">
    <div class="col-lg-5 col-md-7">
        <div class="page-card">
            <div class="text-center mb-4">
                <div class="bg-success-subtle text-success rounded-4 d-inline-flex px-3 py-2 mb-3">
                    <i class="bi bi-shop fs-2"></i>
                </div>

                <h1 class="h3 fw-bold mb-1">
                    Login Warung Arum
                </h1>

                <p class="text-muted mb-0">
                    Masuk untuk mengelola dan memantau stok barang warung.
                </p>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Username
                    </label>

                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-person"></i>
                        </span>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Masukkan username"
                            required
                        >
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-lock"></i>
                        </span>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Masukkan password"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-1"></i>
                    Login
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted mb-1">
                    Belum punya akun Staff?
                </p>

                <a href="{% url 'register' %}" class="fw-semibold text-success text-decoration-none">
                    Register Staff
                </a>
            </div>
        </div>

        <p class="text-center text-muted small mt-3 mb-0">
            Arum Putri Wicaksana | NPM: 24782039
        </p>
    </div>
</div>
{% endblock %}
