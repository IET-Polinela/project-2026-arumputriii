{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="page-card">
            <h1 class="h3 text-center mb-3">Login</h1>
            <p class="text-muted text-center">Masuk ke sistem stok warung.</p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Masukkan username"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Masukkan password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Login
                </button>
            </form>

            <p class="text-center mt-3 mb-0">
                Belum punya akun Staff?
                <a href="{% url 'register' %}">Register Staff</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
